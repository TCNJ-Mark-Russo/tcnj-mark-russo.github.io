<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            * {
                font-family:Arial, Helvetica, sans-serif;
            }

            /* Remove default margins and hide scrollbars */
            html, body {
                margin: 0;
                padding: 0;
                overflow: hidden;
                width: 100%;
                height: 100%;
            }

            /* Force the SVG to fill the viewport precisely */
            svg {
                display: flex;
                justify-content: center; /* Horizontally centers */
                align-items: center;    /* Vertically centers */
                width: 100vw;
                height: 100vh;
            }
            /* Suppress text selection in svg */
            svg text {
                -webkit-user-select: none; /* Safari */
                -moz-user-select: none;    /* Firefox */
                -ms-user-select: none;     /* IE10+/Edge */
                user-select: none;         /* Standard syntax */
            }
        </style>
        <script src="gfx.js"></script>
        <title>Cultivating Crops</title>
    </head>
    <body>
        <svg id="_cvs" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920, 1080" >
            <defs>
                <!-- Define the repeating dirt pattern -->
                <pattern id="dirt-pattern" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse" patternContentUnits="userSpaceOnUse">
                <rect width="30" height="30" fill="tan" />          <!-- #69482b Dark brown base -->
                <circle cx="5"  cy="5"  r="1.5" fill="#fabaaa" />   <!-- #362211 Black rock 1 -->
                <circle cx="20" cy="8"  r="2"   fill="#dca13c" />   <!-- #8c613c Tan speck -->
                <circle cx="12" cy="18" r="1"   fill="#fabaaa" />   <!-- #362211 Black rock 2 -->
                <circle cx="25" cy="22" r="2.5" fill="#dda31d" />   <!-- #4d331d Med brown dirt clod -->
                <circle cx="8"  cy="25" r="1"   fill="#69482b" />   <!-- #a6774e Light speck -->
                </pattern>
            </defs>
            <foreignObject id="instructions" x="400" y="250" width="1120px" height="550px" xmlns="http://www.w3.org/2000/svg">
                <div style="background-color:white; width:100%; height:100%; border:4px solid gray; border-radius:20px; padding: 20px; box-sizing:border-box; font-size:36px;" >
                    <div onclick="hideInstructions()" style="cursor: default; position: absolute; right:20px; top:10px; font-size:48px;" onmouseover="this.style.cursor='default'" onmouseout="this.style.cursor='default'">[X]</div>
                    <h2 style="color:green;">Can you grow crops for a profit?</h2>
                    <ol>
                        <li style="margin-bottom: 12px;">Initial field prep (-$50.00)</li>
                        <li style="margin-bottom: 12px;">Click/tap on field to plant a crop (-$0.50)</li>
                        <li style="margin-bottom: 12px;">Click/tap [Start] to start the growing season</li>
                        <li style="margin-bottom: 12px;">When ready, click/tap crop to harvest (+$3.00)</li>
                        <li>Try to earn a profit before growing season is over (50 days)</li>
                    </ol>
                </div>
            </foreignObject>
        </svg>
        <script src="cc.js" defer></script>
    </body>
</html>
